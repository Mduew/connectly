<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CONNECTLY</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0A0A0E;
      color: #EAEAEF;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    /* Header */
    nav {
      background: rgba(10,10,14,0.95);
      border-bottom: 1px solid #222;
      padding: 15px 0;
      margin-bottom: 30px;
    }

    .nav-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .logo {
      font-size: 1.4rem;
      font-weight: 700;
    }

    .btn {
      padding: 8px 20px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      font-weight: 500;
    }

    .btn-primary {
      background: #5A5A72;
      color: white;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid #3A3A4A;
      color: #EAEAEF;
    }

    /* Auth Cards */
    .auth-container {
      max-width: 500px;
      margin: 0 auto;
    }

    .card {
      background: #12121A;
      border: 1px solid #2C2C38;
      border-radius: 20px;
      padding: 30px;
    }

    h2, h3 {
      margin-bottom: 10px;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      background: #16161F;
      border: 1px solid #2C2C38;
      border-radius: 10px;
      color: white;
      font-size: 1rem;
    }

    .message {
      padding: 12px;
      border-radius: 10px;
      margin: 15px 0;
      font-size: 0.85rem;
    }

    .error { background: #B85C5C; color: white; }
    .success { background: #5A8F7C; color: white; }
    .info { background: #3A3A4A; color: white; }

    /* Dashboard */
    .dashboard {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 20px;
    }

    .sidebar {
      background: #12121A;
      border: 1px solid #2C2C38;
      border-radius: 16px;
      padding: 20px;
    }

    .main-content {
      background: #12121A;
      border: 1px solid #2C2C38;
      border-radius: 16px;
      padding: 20px;
      min-height: 500px;
    }

    .profile-card {
      text-align: center;
      padding-bottom: 15px;
      border-bottom: 1px solid #2C2C38;
    }

    .avatar {
      width: 100px;
      height: 100px;
      background: #16161F;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      margin: 0 auto 10px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .avatar-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.7);
      color: white;
      font-size: 12px;
      text-align: center;
      padding: 4px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .avatar:hover .avatar-overlay {
      opacity: 1;
    }

    .people-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .person-card {
      background: #16161F;
      border: 1px solid #2C2C38;
      border-radius: 12px;
      padding: 15px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .person-card:hover {
      transform: translateY(-3px);
    }

    .person-avatar {
      width: 60px;
      height: 60px;
      background: #16161F;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      margin-bottom: 10px;
      overflow: hidden;
    }

    .person-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Gallery Styles */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .gallery-item {
      aspect-ratio: 1;
      background: #16161F;
      border: 1px solid #2C2C38;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .gallery-item .delete-btn {
      position: absolute;
      top: 5px;
      right: 5px;
      background: rgba(184,92,92,0.9);
      border: none;
      color: white;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gallery-item .delete-btn:hover {
      background: #B85C5C;
    }

    .add-photo-btn {
      background: #16161F;
      border: 2px dashed #3A3A4A;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
    }

    .add-photo-btn:hover {
      border-color: #5A5A72;
      background: #1A1A22;
    }

    .add-photo-btn span {
      font-size: 2rem;
    }

    .unverified-badge {
      background: #B85C5C;
      padding: 2px 8px;
      border-radius: 50px;
      font-size: 0.7rem;
      margin-left: 8px;
    }

    .verified-badge {
      background: #5A8F7C;
      padding: 2px 8px;
      border-radius: 50px;
      font-size: 0.7rem;
      margin-left: 8px;
    }

    /* Modal for viewing photos */
    .lightbox-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .lightbox-modal.active {
      display: flex;
    }

    .lightbox-img {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
    }

    footer {
      text-align: center;
      padding: 30px;
      border-top: 1px solid #222;
      color: #6A6A7A;
      margin-top: 40px;
    }

    @media (max-width: 768px) {
      .dashboard {
        grid-template-columns: 1fr;
      }
      .gallery-grid {
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <div class="logo">📸 CONNECTLY</div>
    <div id="navButtons">
      <button class="btn btn-outline" onclick="showAuthModal()">Sign In / Join</button>
    </div>
  </div>
</nav>

<div class="container">
  <!-- Auth Modal (hidden until needed) -->
  <div id="authModal" class="auth-container" style="display: none;">
    <div class="card">
      <h3 id="authTitle">Create Account</h3>
      <div id="regForm">
        <input type="text" id="regName" placeholder="Full name">
        <input type="text" id="regUsername" placeholder="Username">
        <input type="email" id="regEmail" placeholder="Email">
        <input type="password" id="regPassword" placeholder="Password">
        <input type="text" id="regLocation" placeholder="City">
        <input type="number" id="regAge" placeholder="Age 18+">
        <select id="regInterest">
          <option>Dating</option><option>Friendship</option><option>Networking</option><option>Community</option>
        </select>
        <textarea id="regBio" placeholder="Tell people about yourself..." rows="2"></textarea>
        <label style="display: flex; gap: 8px; margin: 10px 0;">
          <input type="checkbox" id="ageCheck"> I am 18+ years old
        </label>
        <button class="btn btn-primary" style="width:100%" onclick="register()">Create Account</button>
        <p style="text-align:center; margin-top:15px">Already have an account? <a href="#" onclick="switchToLogin()">Sign In</a></p>
      </div>
      <div id="loginForm" style="display:none">
        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPassword" placeholder="Password">
        <button class="btn btn-primary" style="width:100%; margin-top:15px" onclick="login()">Sign In</button>
        <p style="text-align:center; margin-top:15px">New? <a href="#" onclick="switchToRegister()">Create Account</a></p>
      </div>
      <div id="verificationMessage" style="margin-top: 15px;"></div>
    </div>
  </div>

  <!-- Dashboard (shown after login) -->
  <div id="dashboard" style="display: none;">
    <div class="dashboard">
      <div class="sidebar">
        <div class="profile-card">
          <div class="avatar" id="sidebarAvatar" onclick="document.getElementById('profilePicInput').click()">
            <img id="profilePreview" src="" alt="Profile" style="display: none;">
            <span id="avatarPlaceholder">👤</span>
            <div class="avatar-overlay">Change Photo</div>
          </div>
          <input type="file" id="profilePicInput" accept="image/*" style="display: none;" onchange="uploadProfilePicture(this)">
          <h4 id="sidebarName"></h4>
          <p id="sidebarLocation" style="color:#6A6A7A; font-size:0.8rem;"></p>
          <div id="verificationStatus"></div>
        </div>
        <div style="margin-top: 20px;">
          <div class="btn btn-outline" style="width:100%; margin-bottom:10px; text-align:center;" onclick="showPeople()">👥 Browse People</div>
          <div class="btn btn-outline" style="width:100%; margin-bottom:10px; text-align:center;" onclick="showProfile()">✏️ Edit Profile</div>
          <div class="btn btn-outline" style="width:100%; margin-bottom:10px; text-align:center;" onclick="showMyGallery()">📸 My Gallery</div>
          <div class="btn btn-outline" style="width:100%; text-align:center; color:#B85C5C;" onclick="logout()">🚪 Logout</div>
        </div>
      </div>
      <div class="main-content" id="mainContent"></div>
    </div>
  </div>
</div>

<!-- Lightbox Modal for viewing photos -->
<div id="lightboxModal" class="lightbox-modal" onclick="closeLightbox()">
  <img id="lightboxImg" class="lightbox-img" src="">
</div>

<footer>
  <p>© 2024 Connectly · 18+ Only · Upload photos to show your personality!</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<script>
  // ============ CONFIGURATION ============
  const EMAILJS_PUBLIC_KEY = "YOUR_PUBLIC_KEY_HERE";
  const EMAILJS_SERVICE_ID = "YOUR_SERVICE_ID_HERE";  
  const EMAILJS_TEMPLATE_ID = "YOUR_TEMPLATE_ID_HERE";
  
  let emailJSReady = false;
  if (EMAILJS_PUBLIC_KEY !== "YOUR_PUBLIC_KEY_HERE") {
    emailjs.init(EMAILJS_PUBLIC_KEY);
    emailJSReady = true;
  }
  
  // ============ DATA STORAGE ============
  let currentUser = null;
  let users = [];
  let pendingVerifications = {};
  
  function loadData() {
    const stored = localStorage.getItem('connectly_users_verified');
    users = stored ? JSON.parse(stored) : [];
    const logged = localStorage.getItem('connectly_current_user');
    if (logged) {
      currentUser = JSON.parse(logged);
      showDashboard();
      loadPeople();
    } else {
      showAuthModal();
    }
  }
  
  function saveData() {
    localStorage.setItem('connectly_users_verified', JSON.stringify(users));
    if (currentUser) {
      localStorage.setItem('connectly_current_user', JSON.stringify(currentUser));
    }
  }
  
  // ============ PHOTO UPLOAD FUNCTIONS ============
  function uploadProfilePicture(input) {
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      reader.onload = function(e) {
        const imageData = e.target.result;
        currentUser.profilePicture = imageData;
        currentUser.avatar = ''; // Clear text avatar
        
        // Update in users array
        const userIndex = users.findIndex(u => u.id === currentUser.id);
        if (userIndex !== -1) {
          users[userIndex].profilePicture = imageData;
          users[userIndex].avatar = '';
        }
        saveData();
        
        // Update UI
        updateProfileDisplay();
        showMessage("Profile picture updated!", "success");
      };
      reader.readAsDataURL(input.files[0]);
    }
  }
  
  function uploadGalleryPhoto(input) {
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      reader.onload = function(e) {
        const imageData = e.target.result;
        if (!currentUser.gallery) {
          currentUser.gallery = [];
        }
        currentUser.gallery.push(imageData);
        
        // Update in users array
        const userIndex = users.findIndex(u => u.id === currentUser.id);
        if (userIndex !== -1) {
          users[userIndex].gallery = currentUser.gallery;
        }
        saveData();
        
        showMessage("Photo added to your gallery!", "success");
        showMyGallery(); // Refresh gallery view
      };
      reader.readAsDataURL(input.files[0]);
    }
  }
  
  function removeGalleryPhoto(index) {
    if (confirm("Remove this photo from your gallery?")) {
      currentUser.gallery.splice(index, 1);
      const userIndex = users.findIndex(u => u.id === currentUser.id);
      if (userIndex !== -1) {
        users[userIndex].gallery = currentUser.gallery;
      }
      saveData();
      showMyGallery(); // Refresh gallery view
      showMessage("Photo removed", "info");
    }
  }
  
  function viewProfilePhotos(user) {
    const content = document.getElementById('mainContent');
    const gallery = user.gallery || [];
    
    content.innerHTML = `
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h3>📸 ${escapeHtml(user.username)}'s Gallery</h3>
        <button class="btn btn-outline" onclick="showPeople()">← Back to People</button>
      </div>
      <div style="text-align: center; margin-bottom: 30px;">
        <div style="width: 120px; height: 120px; border-radius: 50%; overflow: hidden; margin: 0 auto;">
          ${user.profilePicture ? `<img src="${user.profilePicture}" style="width:100%; height:100%; object-fit:cover;">` : `<div style="width:100%; height:100%; background:#16161F; display:flex; align-items:center; justify-content:center; font-size:3rem;">${user.avatar || user.username[0]}</div>`}
        </div>
        <h4 style="margin-top: 10px;">@${escapeHtml(user.username)}</h4>
        <p>${escapeHtml(user.location)} · ${user.age} · ${user.interest}</p>
        <p class="message info">${escapeHtml(user.bio || "Looking to meet new people!")}</p>
      </div>
      <h4>Gallery Photos (${gallery.length})</h4>
      ${gallery.length === 0 ? '<p class="info">No photos yet.</p>' : ''}
      <div class="gallery-grid">
        ${gallery.map((photo, idx) => `
          <div class="gallery-item" onclick="openLightbox('${photo}')">
            <img src="${photo}" alt="Gallery photo">
          </div>
        `).join('')}
      </div>
    `;
  }
  
  function showMyGallery() {
    const content = document.getElementById('mainContent');
    const gallery = currentUser.gallery || [];
    
    content.innerHTML = `
      <h3>📸 My Photo Gallery</h3>
      <p class="info">Upload photos to show your personality! Others can view your gallery.</p>
      
      <input type="file" id="galleryUploadInput" accept="image/*" style="display: none;" onchange="uploadGalleryPhoto(this)">
      <div class="gallery-grid">
        ${gallery.map((photo, idx) => `
          <div class="gallery-item">
            <img src="${photo}" alt="Gallery photo" onclick="openLightbox('${photo}')">
            <button class="delete-btn" onclick="event.stopPropagation(); removeGalleryPhoto(${idx})">✕</button>
          </div>
        `).join('')}
        <div class="gallery-item add-photo-btn" onclick="document.getElementById('galleryUploadInput').click()">
          <span>+</span>
          <span style="font-size: 12px;">Add Photo</span>
        </div>
      </div>
    `;
  }
  
  function updateProfileDisplay() {
    const avatarDiv = document.getElementById('sidebarAvatar');
    const profileImg = document.getElementById('profilePreview');
    const placeholder = document.getElementById('avatarPlaceholder');
    
    if (currentUser.profilePicture) {
      profileImg.src = currentUser.profilePicture;
      profileImg.style.display = 'block';
      placeholder.style.display = 'none';
    } else {
      profileImg.style.display = 'none';
      placeholder.style.display = 'block';
      placeholder.innerHTML = currentUser.avatar || currentUser.username[0];
    }
  }
  
  function openLightbox(imageSrc) {
    document.getElementById('lightboxImg').src = imageSrc;
    document.getElementById('lightboxModal').classList.add('active');
  }
  
  function closeLightbox() {
    document.getElementById('lightboxModal').classList.remove('active');
  }
  
  // ============ EMAIL VERIFICATION ============
  async function sendVerificationEmail(email, username, verificationCode) {
    if (!emailJSReady) return true;
    try {
      const templateParams = {
        to_email: email,
        to_name: username,
        verification_code: verificationCode,
        message: `Hello ${username}! Your verification code is: ${verificationCode}.`
      };
      const response = await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams);
      return response.status === 200;
    } catch (error) {
      return false;
    }
  }
  
  function generateVerificationCode() {
    return Math.floor(100000 + Math.random() * 900000).toString();
  }
  
  async function register() {
    const name = document.getElementById('regName').value.trim();
    let username = document.getElementById('regUsername').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const pwd = document.getElementById('regPassword').value;
    const location = document.getElementById('regLocation').value.trim();
    const age = parseInt(document.getElementById('regAge').value);
    const interest = document.getElementById('regInterest').value;
    const bio = document.getElementById('regBio').value.trim();
    const ageCheck = document.getElementById('ageCheck').checked;
    
    if (!name || !username || !email || !pwd || !location || !age) {
      showMessage("Please fill all fields", "error");
      return;
    }
    if (age < 18) { showMessage("Must be 18+", "error"); return; }
    if (!ageCheck) { showMessage("Confirm you're 18+", "error"); return; }
    if (users.find(u => u.username === username)) { showMessage("Username taken", "error"); return; }
    if (users.find(u => u.email === email)) { showMessage("Email already registered", "error"); return; }
    
    const verificationCode = generateVerificationCode();
    const expiresAt = Date.now() + 600000;
    
    pendingVerifications[email] = {
      code: verificationCode,
      expiresAt: expiresAt,
      userData: { name, username, email, password: btoa(pwd), age, location, interest, bio, avatar: username[0].toUpperCase(), gallery: [], profilePicture: null }
    };
    
    showMessage("📧 Sending verification email...", "info");
    const emailSent = await sendVerificationEmail(email, username, verificationCode);
    
    if (emailSent) {
      showMessage(`✓ Verification code sent to ${email}.`, "success");
      document.getElementById('regForm').style.display = 'none';
      document.getElementById('verificationMessage').innerHTML = `
        <div class="message info">
          <strong>📧 Verification Required</strong><br>
          We sent a 6-digit code to ${email}.
        </div>
        <input type="text" id="verifyCode" placeholder="Enter 6-digit code">
        <button class="btn btn-primary" style="width:100%; margin-top: 10px;" onclick="verifyAndCompleteRegistration('${email}')">Verify & Complete</button>
        <button class="btn btn-outline" style="width:100%; margin-top: 10px;" onclick="resendCode('${email}')">Resend Code</button>
      `;
    } else {
      showMessage("Demo mode: Account created without verification.", "info");
      completeRegistration(email, pendingVerifications[email].userData);
    }
  }
  
  function verifyAndCompleteRegistration(email) {
    const enteredCode = document.getElementById('verifyCode').value.trim();
    const pending = pendingVerifications[email];
    
    if (!pending) { showMessage("Verification expired.", "error"); return; }
    if (Date.now() > pending.expiresAt) { showMessage("Code expired.", "error"); return; }
    if (enteredCode !== pending.code) { showMessage("Invalid code.", "error"); return; }
    
    completeRegistration(email, pending.userData);
  }
  
  function completeRegistration(email, userData) {
    const newUser = {
      id: Date.now(),
      ...userData,
      isVerified: true,
      verifiedAt: new Date().toISOString(),
      createdAt: Date.now(),
      gallery: [],
      profilePicture: null
    };
    
    users.push(newUser);
    currentUser = { ...newUser, password: undefined };
    saveData();
    delete pendingVerifications[email];
    
    showMessage(`✓ Welcome ${userData.username}!`, "success");
    setTimeout(() => {
      showDashboard();
      loadPeople();
    }, 1500);
  }
  
  async function resendCode(email) {
    const pending = pendingVerifications[email];
    if (!pending) { showMessage("No pending registration", "error"); return; }
    
    const newCode = generateVerificationCode();
    pending.code = newCode;
    pending.expiresAt = Date.now() + 600000;
    
    await sendVerificationEmail(email, pending.userData.username, newCode);
    showMessage(`✓ New code sent to ${email}`, "success");
  }
  
  function login() {
    const email = document.getElementById('loginEmail').value.trim();
    const pwd = document.getElementById('loginPassword').value;
    const user = users.find(u => u.email === email && u.password === btoa(pwd));
    
    if (!user) { showMessage("Invalid credentials", "error"); return; }
    if (!user.isVerified) { showMessage("⚠️ Please verify your email first.", "error"); return; }
    
    currentUser = { ...user, password: undefined };
    saveData();
    showDashboard();
    loadPeople();
  }
  
  function showAuthModal() {
    document.getElementById('authModal').style.display = 'block';
    document.getElementById('dashboard').style.display = 'none';
    switchToRegister();
  }
  
  function showDashboard() {
    document.getElementById('authModal').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    
    document.getElementById('sidebarName').innerHTML = currentUser.username;
    document.getElementById('sidebarLocation').innerHTML = currentUser.location;
    updateProfileDisplay();
    
    const verificationStatus = document.getElementById('verificationStatus');
    verificationStatus.innerHTML = currentUser.isVerified ? '<span class="verified-badge">✓ Verified Email</span>' : '<span class="unverified-badge">⚠️ Unverified</span>';
    
    showPeople();
  }
  
  function showPeople() {
    const otherUsers = users.filter(u => u.id !== currentUser.id && u.isVerified);
    const content = document.getElementById('mainContent');
    
    if (otherUsers.length === 0) {
      content.innerHTML = '<h3>👥 People Near You</h3><p style="text-align:center; padding:40px;">No other verified users yet.</p>';
      return;
    }
    
    content.innerHTML = `
      <h3>👥 Verified Members</h3>
      <div class="people-grid">
        ${otherUsers.map(user => `
          <div class="person-card" onclick="viewProfilePhotos(${JSON.stringify(user).replace(/"/g, '&quot;')})">
            <div class="person-avatar">
              ${user.profilePicture ? `<img src="${user.profilePicture}" alt="Profile">` : `<span style="font-size:1.8rem;">${user.avatar || user.username[0]}</span>`}
            </div>
            <h4>${escapeHtml(user.username)}</h4>
            <p style="color:#9A9AAB; font-size:0.8rem;">${escapeHtml(user.location)} · ${user.age}</p>
            <p style="color:#6A6A7A; font-size:0.75rem;">${escapeHtml(user.interest)}</p>
            <div class="verified-badge" style="margin-top:8px;">✓ Verified</div>
            <div style="margin-top:8px;"><small>📸 ${(user.gallery || []).length} photos</small></div>
          </div>
        `).join('')}
      </div>
    `;
  }
  
  function showProfile() {
    const content = document.getElementById('mainContent');
    content.innerHTML = `
      <h3>✏️ Edit Your Profile</h3>
      <div class="info" style="margin-bottom: 15px;">
        <strong>📸 Profile Picture</strong><br>
        Click on your avatar in the sidebar to upload a profile picture.
      </div>
      <div style="margin-top: 20px;">
        <label>Username</label>
        <input type="text" id="editUsername" value="${escapeHtml(currentUser.username)}">
        <label>Location</label>
        <input type="text" id="editLocation" value="${escapeHtml(currentUser.location)}">
        <label>Age</label>
        <input type="number" id="editAge" value="${currentUser.age}">
        <label>Interest</label>
        <select id="editInterest">
          <option ${currentUser.interest === 'Dating' ? 'selected' : ''}>Dating</option>
          <option ${currentUser.interest === 'Friendship' ? 'selected' : ''}>Friendship</option>
          <option ${currentUser.interest === 'Networking' ? 'selected' : ''}>Networking</option>
          <option ${currentUser.interest === 'Community' ? 'selected' : ''}>Community</option>
        </select>
        <label>Bio</label>
        <textarea id="editBio" rows="3">${escapeHtml(currentUser.bio || '')}</textarea>
        <button class="btn btn-primary" onclick="updateProfile()">Save Changes</button>
      </div>
      <hr>
      <div class="message info">
        <strong>✓ Email Verified</strong><br>
        Your email ${escapeHtml(currentUser.email)} has been verified.
      </div>
    `;
  }
  
  function updateProfile() {
    currentUser.username = document.getElementById('editUsername').value.trim();
    currentUser.location = document.getElementById('editLocation').value.trim();
    currentUser.age = parseInt(document.getElementById('editAge').value);
    currentUser.interest = document.getElementById('editInterest').value;
    currentUser.bio = document.getElementById('editBio').value.trim();
    if (!currentUser.profilePicture) {
      currentUser.avatar = currentUser.username[0].toUpperCase();
    }
    
    const userIndex = users.findIndex(u => u.id === currentUser.id);
    if (userIndex !== -1) {
      users[userIndex] = { ...users[userIndex], ...currentUser };
    }
    saveData();
    showMessage("Profile updated!", "success");
    showProfile();
    document.getElementById('sidebarName').innerHTML = currentUser.username;
    updateProfileDisplay();
  }
  
  function logout() {
    currentUser = null;
    localStorage.removeItem('connectly_current_user');
    showAuthModal();
  }
  
  function showMessage(msg, type) {
    const msgDiv = document.getElementById('verificationMessage');
    if (msgDiv) {
      msgDiv.innerHTML = `<div class="message ${type}">${msg}</div>`;
      setTimeout(() => msgDiv.innerHTML = '', 3000);
    } else {
      alert(msg);
    }
  }
  
  function switchToLogin() {
    document.getElementById('regForm').style.display = 'none';
    document.getElementById('loginForm').style.display = 'block';
    document.getElementById('authTitle').innerText = 'Sign In';
    document.getElementById('verificationMessage').innerHTML = '';
  }
  
  function switchToRegister() {
    document.getElementById('regForm').style.display = 'block';
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('authTitle').innerText = 'Create Account';
    document.getElementById('verificationMessage').innerHTML = '';
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;';
    });
  }
  
  window.register = register;
  window.login = login;
  window.logout = logout;
  window.showPeople = showPeople;
  window.showProfile = showProfile;
  window.showMyGallery = showMyGallery;
  window.updateProfile = updateProfile;
  window.showAuthModal = showAuthModal;
  window.switchToLogin = switchToLogin;
  window.switchToRegister = switchToRegister;
  window.verifyAndCompleteRegistration = verifyAndCompleteRegistration;
  window.resendCode = resendCode;
  window.uploadProfilePicture = uploadProfilePicture;
  window.uploadGalleryPhoto = uploadGalleryPhoto;
  window.removeGalleryPhoto = removeGalleryPhoto;
  window.viewProfilePhotos = viewProfilePhotos;
  window.openLightbox = openLightbox;
  window.closeLightbox = closeLightbox;
  
  loadData();
</script>
</body>
</html>
