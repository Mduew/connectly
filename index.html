<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connectly | Social Discovery</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0A0A0E;
      color: #EAEAEF;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      line-height: 1.5;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* Navbar */
    nav {
      background: rgba(10,10,14,0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #222;
      padding: 15px 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      cursor: pointer;
    }

    .token-badge {
      background: #16161F;
      border: 1px solid #2C2C38;
      padding: 6px 14px;
      border-radius: 50px;
      font-size: 0.8rem;
      cursor: pointer;
    }

    .btn {
      padding: 8px 20px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.85rem;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid #2C2C38;
      color: #9A9AAB;
    }

    .btn-primary {
      background: #5A5A72;
      color: white;
    }

    .btn-primary:hover {
      background: #6E6E86;
    }

    /* Hero */
    .hero {
      text-align: center;
      padding: 60px 20px;
      border-bottom: 1px solid #222;
    }

    .hero h1 {
      font-size: 2.5rem;
      margin-bottom: 15px;
    }

    .hero p {
      color: #9A9AAB;
      max-width: 500px;
      margin: 0 auto 25px;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 40px;
      padding-top: 30px;
      border-top: 1px solid #222;
    }

    .stat-value {
      font-size: 1.6rem;
      font-weight: 600;
    }

    .stat-label {
      font-size: 0.7rem;
      color: #6A6A7A;
    }

    /* Filters */
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin: 30px 0 20px;
    }

    .filter {
      background: #16161F;
      border: 1px solid #2C2C38;
      padding: 6px 18px;
      border-radius: 50px;
      cursor: pointer;
      font-size: 0.8rem;
    }

    .filter.active {
      background: #3A3A4A;
      color: white;
    }

    /* Profile Grid */
    .profiles {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin: 30px 0;
    }

    .profile-card {
      background: #12121A;
      border: 1px solid #222;
      border-radius: 16px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .profile-card:hover {
      transform: translateY(-3px);
    }

    .profile-banner {
      height: 100px;
      background: #16161F;
      border-bottom: 1px solid #222;
      position: relative;
    }

    .avatar {
      position: absolute;
      bottom: -30px;
      left: 20px;
      width: 65px;
      height: 65px;
      background: #0A0A0E;
      border-radius: 50%;
      border: 3px solid #12121A;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
    }

    .profile-info {
      padding: 40px 15px 15px;
    }

    .username {
      font-weight: 600;
      font-size: 1rem;
    }

    .location {
      font-size: 0.7rem;
      color: #6A6A7A;
      margin: 5px 0 8px;
    }

    .bio {
      font-size: 0.75rem;
      color: #9A9AAB;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: #101016;
      border: 1px solid #2C2C38;
      border-radius: 20px;
      max-width: 500px;
      width: 90%;
      padding: 30px;
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 15px;
      right: 20px;
      background: #16161F;
      border: none;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      cursor: pointer;
      color: white;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      background: #16161F;
      border: 1px solid #2C2C38;
      border-radius: 10px;
      color: white;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #3A3A4A;
      padding: 10px 20px;
      border-radius: 50px;
      display: none;
      z-index: 300;
    }

    footer {
      text-align: center;
      padding: 30px;
      border-top: 1px solid #222;
      color: #6A6A7A;
      font-size: 0.75rem;
    }

    @media (max-width: 600px) {
      .hero h1 { font-size: 1.8rem; }
      .stats { gap: 20px; }
    }
  </style>
</head>
<body>

<nav>
  <div class="container nav-inner">
    <div class="logo" onclick="location.reload()">❤️ CONNECTLY</div>
    <div style="display: flex; gap: 15px; align-items: center;">
      <div class="token-badge" id="tokenDisplay" onclick="openShop()">🪙 0</div>
      <button class="btn btn-outline" id="authBtn" onclick="openAuth()">Join</button>
    </div>
  </div>
</nav>

<div class="hero">
  <div class="container">
    <h1>Find your people</h1>
    <p>A space for genuine connections, friendships, and relationships</p>
    <button class="btn btn-primary" onclick="openAuth()">Get Started →</button>
    <div class="stats">
      <div><div class="stat-value" id="memberCount">0</div><div class="stat-label">Members</div></div>
      <div><div class="stat-value" id="onlineCount">0</div><div class="stat-label">Online</div></div>
    </div>
  </div>
</div>

<div class="container">
  <div class="filters" id="filters"></div>
  <div class="profiles" id="profiles"></div>
</div>

<footer>
  <p>© 2024 Connectly · 18+ Only · Be Kind, Be Real</p>
</footer>

<!-- Auth Modal -->
<div id="authModal" class="modal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeAuth()">✕</button>
    <h3 id="authTitle">Create Account</h3>
    <div id="regForm">
      <input type="text" id="name" placeholder="Full name">
      <input type="text" id="username" placeholder="Username">
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Password">
      <input type="text" id="location" placeholder="City">
      <input type="number" id="age" placeholder="Age 18+">
      <select id="interest">
        <option>Dating</option><option>Friendship</option><option>Networking</option>
      </select>
      <textarea id="bio" placeholder="Tell us about yourself..." rows="2"></textarea>
      <label style="display: flex; gap: 8px; margin: 10px 0;">
        <input type="checkbox" id="ageCheck"> I am 18+ years old
      </label>
      <button class="btn btn-primary" style="width:100%" onclick="register()">Join</button>
      <p style="text-align:center; margin-top:15px">Have an account? <a href="#" onclick="switchLogin()">Sign In</a></p>
    </div>
    <div id="loginForm" style="display:none">
      <input type="email" id="loginEmail" placeholder="Email">
      <input type="password" id="loginPass" placeholder="Password">
      <button class="btn btn-primary" style="width:100%; margin-top:15px" onclick="login()">Sign In</button>
      <p style="text-align:center; margin-top:15px">New? <a href="#" onclick="switchRegister()">Create Account</a></p>
    </div>
  </div>
</div>

<!-- Profile View Modal -->
<div id="profileModal" class="modal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeProfile()">✕</button>
    <div id="profileView"></div>
  </div>
</div>

<!-- Shop Modal -->
<div id="shopModal" class="modal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeShop()">✕</button>
    <h3>🪙 Buy Credits</h3>
    <div style="margin: 15px 0">
      <div style="display:flex; justify-content:space-between; padding:10px; background:#16161F; border-radius:10px; margin:8px 0">
        <span>50 credits</span><span>$4.99</span><button class="btn btn-outline" onclick="buy(50,4.99)">Buy</button>
      </div>
      <div style="display:flex; justify-content:space-between; padding:10px; background:#16161F; border-radius:10px; margin:8px 0">
        <span>250 credits</span><span>$19.99</span><button class="btn btn-outline" onclick="buy(250,19.99)">Buy</button>
      </div>
      <div style="display:flex; justify-content:space-between; padding:10px; background:#16161F; border-radius:10px; margin:8px 0">
        <span>750 credits</span><span>$49.99</span><button class="btn btn-outline" onclick="buy(750,49.99)">Buy</button>
      </div>
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="subscribe()">Subscribe $9.99/mo → Unlimited</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  let currentUser = null;
  let users = [];
  let messages = [];

  function load() {
    const stored = localStorage.getItem('connectly_users');
    users = stored ? JSON.parse(stored) : [];
    const logged = localStorage.getItem('connectly_user');
    if (logged) currentUser = JSON.parse(logged);
    update();
    render();
  }

  function save() {
    localStorage.setItem('connectly_users', JSON.stringify(users));
    if (currentUser) localStorage.setItem('connectly_user', JSON.stringify(currentUser));
    else localStorage.removeItem('connectly_user');
  }

  function update() {
    document.getElementById('memberCount').innerText = users.length;
    document.getElementById('onlineCount').innerText = users.filter(u => u.online).length;
    if (currentUser) {
      document.getElementById('tokenDisplay').innerHTML = `🪙 ${currentUser.tokens}`;
      document.getElementById('authBtn').innerHTML = currentUser.username;
    } else {
      document.getElementById('tokenDisplay').innerHTML = `🪙 0`;
      document.getElementById('authBtn').innerHTML = 'Join';
    }
    
    // Filters
    const interests = [...new Set(users.map(u => u.interest))];
    const filterDiv = document.getElementById('filters');
    filterDiv.innerHTML = '<div class="filter active" onclick="filterAll()">All</div>' + 
      interests.map(i => `<div class="filter" onclick="filterBy('${i}')">${i}</div>`).join('');
  }

  let currentFilter = 'all';
  function filterAll() { currentFilter = 'all'; render(); }
  function filterBy(interest) { currentFilter = interest; render(); }

  function render() {
    let list = users.filter(u => !currentUser || u.id !== currentUser.id);
    if (currentFilter !== 'all') list = list.filter(u => u.interest === currentFilter);
    const grid = document.getElementById('profiles');
    if (list.length === 0) {
      grid.innerHTML = '<div style="text-align:center; padding:50px">✨ No one yet. Be the first!</div>';
      return;
    }
    grid.innerHTML = list.map(u => `
      <div class="profile-card" onclick="viewProfile(${u.id})">
        <div class="profile-banner"><div class="avatar">${u.avatar || u.username[0]}</div></div>
        <div class="profile-info">
          <div class="username">${escape(u.username)} ${u.premium ? '⭐' : ''}</div>
          <div class="location">📍 ${escape(u.location)} · ${u.age}</div>
          <div class="bio">${escape((u.bio || '').substring(0, 80))}</div>
        </div>
      </div>
    `).join('');
  }

  function viewProfile(id) {
    const user = users.find(u => u.id === id);
    if (!user) return;
    document.getElementById('profileView').innerHTML = `
      <div style="text-align:center">
        <div style="font-size:3rem; background:#16161F; width:80px; height:80px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; margin-bottom:15px">${user.avatar || user.username[0]}</div>
        <h3>${escape(user.username)}</h3>
        <p style="color:#9A9AAB">${escape(user.location)} · ${user.age} · ${user.interest}</p>
        <div style="background:#16161F; padding:15px; border-radius:12px; margin:15px 0">${escape(user.bio || 'Looking to meet new people')}</div>
        ${currentUser ? `<button class="btn btn-primary" onclick="sendMessage(${user.id})">💬 Send Message</button>` : '<button class="btn btn-primary" onclick="openAuth()">Sign in to connect</button>'}
      </div>
    `;
    document.getElementById('profileModal').classList.add('active');
  }

  function sendMessage(toId) {
    if (!currentUser) { showToast("Sign in first", true); return; }
    const msg = prompt("Type your message:");
    if (!msg) return;
    if (!currentUser.premium && currentUser.tokens < 5) {
      showToast("First message costs 5 credits. Buy credits first.", true);
      openShop();
      return;
    }
    if (!currentUser.premium) {
      currentUser.tokens -= 5;
      save();
      update();
    }
    messages.push({ from: currentUser.id, to: toId, text: msg, time: Date.now() });
    showToast("✓ Message sent!");
    closeProfile();
  }

  function register() {
    const name = document.getElementById('name').value.trim();
    let username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const pwd = document.getElementById('password').value;
    const location = document.getElementById('location').value.trim();
    const age = parseInt(document.getElementById('age').value);
    const interest = document.getElementById('interest').value;
    const bio = document.getElementById('bio').value.trim();
    const ageCheck = document.getElementById('ageCheck').checked;

    if (!name || !username || !email || !pwd || !location || !age) {
      showToast("Fill all fields", true); return;
    }
    if (age < 18) { showToast("Must be 18+", true); return; }
    if (!ageCheck) { showToast("Confirm you're 18+", true); return; }
    if (users.find(u => u.username === username)) { showToast("Username taken", true); return; }
    if (users.find(u => u.email === email)) { showToast("Email exists", true); return; }

    const newUser = {
      id: Date.now(),
      name, username, email, password: btoa(pwd),
      age, location, interest, bio,
      tokens: 20, premium: false, online: true,
      avatar: username[0].toUpperCase()
    };
    users.push(newUser);
    currentUser = { ...newUser, password: undefined };
    save();
    update();
    render();
    closeAuth();
    showToast(`Welcome ${username}! You have 20 credits.`);
  }

  function login() {
    const email = document.getElementById('loginEmail').value.trim();
    const pwd = document.getElementById('loginPass').value;
    const user = users.find(u => u.email === email && u.password === btoa(pwd));
    if (!user) { showToast("Invalid credentials", true); return; }
    currentUser = { ...user, password: undefined };
    save();
    update();
    render();
    closeAuth();
    showToast(`Welcome back ${user.username}`);
  }

  function buy(amount, price) {
    if (!currentUser) { showToast("Sign in first", true); closeShop(); openAuth(); return; }
    if (confirm(`Buy ${amount} credits for $${price}? (Demo)`)) {
      currentUser.tokens += amount;
      save();
      update();
      showToast(`✓ ${amount} credits added`);
      closeShop();
    }
  }

  function subscribe() {
    if (!currentUser) { showToast("Sign in first", true); return; }
    if (confirm("Subscribe for $9.99/month? Unlimited messaging")) {
      currentUser.premium = true;
      save();
      update();
      showToast("✓ Premium activated!");
      closeShop();
    }
  }

  function openAuth() { document.getElementById('authModal').classList.add('active'); switchRegister(); }
  function closeAuth() { document.getElementById('authModal').classList.remove('active'); }
  function switchLogin() { document.getElementById('regForm').style.display = 'none'; document.getElementById('loginForm').style.display = 'block'; document.getElementById('authTitle').innerText = 'Sign In'; }
  function switchRegister() { document.getElementById('regForm').style.display = 'block'; document.getElementById('loginForm').style.display = 'none'; document.getElementById('authTitle').innerText = 'Create Account'; }
  function closeProfile() { document.getElementById('profileModal').classList.remove('active'); }
  function openShop() { document.getElementById('shopModal').classList.add('active'); }
  function closeShop() { document.getElementById('shopModal').classList.remove('active'); }
  
  function showToast(msg, isErr = false) {
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.style.display = 'block';
    t.style.background = isErr ? '#B85C5C' : '#3A3A4A';
    setTimeout(() => t.style.display = 'none', 2500);
  }
  
  function escape(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'; }); }

  load();
</script>
</body>
</html>
